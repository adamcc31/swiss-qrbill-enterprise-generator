<div class="app-container">
  
  <!-- Left Sidebar: Input Form & Settings -->
  <aside class="sidebar-panel">
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">🇨🇭</span>
        <div class="title-meta">
          <h1>Swiss QR-Bill Creator</h1>
          <span class="version-badge">Enterprise v1.2</span>
        </div>
      </div>
      <p class="subtitle">ISO 20022 Compliant Payment Slip Generator</p>
      
      <!-- Whitelisted Swagger/OpenAPI Link Info for Developers -->
      <div class="swagger-info-badge">
        <span class="pulse-dot-blue"></span>
        <span class="swagger-text">API Specs live at <a href="http://localhost:8081/swagger-ui/index.html" target="_blank" class="swagger-link">/swagger-ui</a></span>
      </div>
    </header>

    <!-- Global API Error list -->
    <app-api-error [errors]="apiErrors"></app-api-error>

    <!-- QR Input Form (Fully Tabbed Refactored UX) -->
    <app-qrbill-form 
      [isGenerated]="billData !== null"
      (formSubmit)="onFormSubmit($event)" 
      (printTrigger)="onPrint()">
    </app-qrbill-form>
  </aside>

  <!-- Right Preview Panel: Live rendering of QR-Bill -->
  <main class="preview-panel">
    <div class="preview-header">
      <div class="header-main-title">
        <h2>Compliant QR-Bill Preview</h2>
        <p class="header-subtitle">Real-time payment rendering engine</p>
      </div>
      <span class="live-indicator">
        <span class="pulse-dot"></span> Live Render
      </span>
    </div>

    <!-- Compliant Payment Slip Visualizer -->
    <app-payment-slip [billData]="billData"></app-payment-slip>
  </main>
</div>
