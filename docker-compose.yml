services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swiss-qrbill-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_CORS_ALLOWED_ORIGIN=http://localhost:4200
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swiss-qrbill-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
