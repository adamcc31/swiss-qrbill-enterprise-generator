name: Swiss QR-Bill CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ==========================================
  # Backend Build and Test (including JaCoCo)
  # ==========================================
  backend-ci:
    name: Backend Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build and Test Backend (with JaCoCo)
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean verify

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 14

  # ==========================================
  # Frontend Build and Verification
  # ==========================================
  frontend-ci:
    name: Frontend Build & Compile (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Angular Application
        run: |
          cd frontend
          npm run build -- --configuration=production
