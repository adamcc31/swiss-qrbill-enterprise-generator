server:
  port: 8081
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      internal-proxies: ".*" # Regexp matching proxy IPs (e.g. "10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}" or specific CIDRs). Configure this in production to prevent IP spoofing.

logging:
  level:
    com.exata.swissqrbill: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd %H:mm:ss.SSS} [%thread] %-5level %logger{36} - [Correlation-ID: %X{Correlation-ID:-N/A}] - %msg%n"

app:
  cors:
    allowed-origin: "http://localhost:4200"
